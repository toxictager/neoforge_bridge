plugins {
    id 'java'
    id 'net.neoforged.moddev' version '2.0.78'
    id 'com.gradleup.shadow' version '8.3.5'
}

group = 'com.absolutebuddies'
version = '2.0.0'

base {
    archivesName = 'sophisticatedbackpacksetchedintegration'
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

neoForge {
    version = '21.1.172'

    mods {
        sophisticatedbackpacksetchedintegration {
            sourceSet(sourceSets.main)
        }
    }
}

repositories {
    maven {
        name = 'Curse Maven'
        url = 'https://www.cursemaven.com'
    }
    maven { url = 'https://repo.maven.apache.org/maven2/' }
}

dependencies {
    // Etched 5.0.0 NeoForge 1.21.1
    compileOnly "curse.maven:etched-491890:7088631"

    // SophisticatedCore 1.21.1 NeoForge
    compileOnly "curse.maven:sophisticated-core-618298:7455151"

    // Shaded libs - declare directly as implementation
    implementation 'net.jthink:jaudiotagger:3.0.1'
    implementation 'commons-io:commons-io:2.15.1'
}

jar {
    manifest {
        attributes([
            'Specification-Title'    : 'sophisticatedbackpacksetchedintegration',
            'Specification-Vendor'   : 'RootTool, At0m',
            'Specification-Version'  : '1',
            'Implementation-Title'   : 'Sophisticated-Backpacks-Etched-Integration',
            'Implementation-Version' : project.version,
            'Implementation-Vendor'  : 'RootTool, At0m',
            'MixinConfigs'           : 'sophisticatedbackpacksetchedintegration.mixins.json'
        ])
    }
}

shadowJar {
    archiveClassifier = ''
    dependencies {
        include(dependency('net.jthink:jaudiotagger'))
        include(dependency('commons-io:commons-io'))
    }
    mergeServiceFiles()
    manifest {
        attributes([
            'Specification-Title'    : 'sophisticatedbackpacksetchedintegration',
            'Specification-Vendor'   : 'RootTool, At0m',
            'Specification-Version'  : '1',
            'Implementation-Title'   : 'Sophisticated-Backpacks-Etched-Integration',
            'Implementation-Version' : project.version,
            'Implementation-Vendor'  : 'RootTool, At0m',
            'MixinConfigs'           : 'sophisticatedbackpacksetchedintegration.mixins.json'
        ])
    }
}

build.dependsOn shadowJar
