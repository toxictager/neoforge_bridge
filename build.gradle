plugins {
    id 'java'
    id 'net.neoforged.moddev' version '2.0.78'
    id 'com.gradleup.shadow' version '8.3.5'
}

group = 'com.absolutebuddies'
version = '2.0.0'

base {
    archivesName = 'sophisticatedbackpacksetchedintegration'
}

java {
    toolchain.languageVersion = JavaLanguageVersion.of(21)
}

neoForge {
    version = '21.1.172'

    mods {
        sophisticatedbackpacksetchedintegration {
            sourceSet(sourceSets.main)
        }
    }
}

repositories {
    maven {
        name = 'Curse Maven'
        url = 'https://www.cursemaven.com'
    }
    maven { url = 'https://repo.maven.apache.org/maven2/' }
}

configurations {
    shade
    compileOnly.extendsFrom shade
}

dependencies {
    // Etched 5.0.0 NeoForge 1.21.1 (project 491890, file 7088631)
    compileOnly "curse.maven:etched-491890:7088631"

    // SophisticatedCore 1.21.1 NeoForge (project 618298, file 7455151)
    compileOnly "curse.maven:sophisticated-core-618298:7455151"

    // SophisticatedBackpacks 1.21.1 NeoForge (project 422286, file from uploaded jar)
    // Using the same SophisticatedCore above covers the API we need

    // Shaded libs
    shade 'net.jthink:jaudiotagger:3.0.1'
    shade 'commons-io:commons-io:2.15.1'
    implementation configurations.shade
}

jar {
    manifest {
        attributes([
            'Specification-Title'    : 'sophisticatedbackpacksetchedintegration',
            'Specification-Vendor'   : 'RootTool, At0m',
            'Specification-Version'  : '1',
            'Implementation-Title'   : 'Sophisticated-Backpacks-Etched-Integration',
            'Implementation-Version' : project.version,
            'Implementation-Vendor'  : 'RootTool, At0m',
            'MixinConfigs'           : 'sophisticatedbackpacksetchedintegration.mixins.json'
        ])
    }
}

shadowJar {
    configurations = [project.configurations.shade]
    archiveClassifier = ''
    mergeServiceFiles()
    manifest {
        attributes([
            'Specification-Title'    : 'sophisticatedbackpacksetchedintegration',
            'Specification-Vendor'   : 'RootTool, At0m',
            'Specification-Version'  : '1',
            'Implementation-Title'   : 'Sophisticated-Backpacks-Etched-Integration',
            'Implementation-Version' : project.version,
            'Implementation-Vendor'  : 'RootTool, At0m',
            'MixinConfigs'           : 'sophisticatedbackpacksetchedintegration.mixins.json'
        ])
    }
}

build.dependsOn shadowJar
